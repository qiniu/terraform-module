$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
properties:
  root_password:
    type: string
    description: "实例 root 用户密码（要求：不少于 8 位，必须同时包含字母、数字和特殊符号）"
    minLength: 8
    allOf:
      - pattern: "[A-Za-z]"
      - pattern: "[0-9]"
      - pattern: "[^A-Za-z0-9]"

  qiniu_maas_api_key:
    type: string
    description: "七牛 MaaS API 密钥（从 https://portal.qiniu.com/ai-inference/api-key 获取）"
    minLength: 1

  default_model:
    type: string
    description: "使用的 AI 模型（如 minimax/minimax-m2.5、deepseek/deepseek-chat、qwen/qwen-max 等）"
    default: "minimax/minimax-m2.5"

  wx_secret:
    type: string
    description: "可选的微信绑定串，格式为 botid|token|savedAt|baseUrl|userId；为空时跳过微信初始化"
    default: ""

  qq_secret:
    type: string
    description: "可选的 QQ 机器人凭证，格式为 AppID:AppSecret；为空时跳过 QQ channel 初始化"
    default: ""

  gateway_port:
    type: number
    description: "Gateway 端口"
    default: 18789
    minimum: 1
    maximum: 65535

  expose_dashboard:
    type: boolean
    description: "是否将 Dashboard 暴露到公网"
    default: false

  disable_device_auth:
    type: boolean
    description: "是否禁用设备认证"
    default: false

required:
  - root_password
  - qiniu_maas_api_key

x-input-groups:
  - name: "七牛 LAS 配置"
    inputs:
      - root_password
  - name: "七牛 MaaS 配置"
    inputs:
      - qiniu_maas_api_key
      - default_model
  - name: "通信平台配置"
    inputs:
      - wx_secret
      - qq_secret
    collapsible: true # 可以被折叠
    defaultCollapsed: true # 默认折叠起来

  - name: "OpenClaw Gateway 配置"
    inputs:
      - gateway_port
      - expose_dashboard
      - disable_device_auth
    collapsible: true # 可以被折叠
    defaultCollapsed: true # 默认折叠起来
