$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
properties:
  instance_type:
    type: string
    description: "ECS 实例规格"
    default: "ecs.t1.c4m8"
    enum:
      - "ecs.t1.c1m2"
      - "ecs.t1.c2m4"
      - "ecs.t1.c4m8"
      - "ecs.t1.c8m16"
      - "ecs.t1.c12m24"
      - "ecs.t1.c16m32"
      - "ecs.t1.c24m48"
      - "ecs.t1.c32m64"
      - "ecs.c1.c1m2"
      - "ecs.c1.c2m4"
      - "ecs.c1.c4m8"
      - "ecs.c1.c8m16"
      - "ecs.c1.c12m24"
      - "ecs.c1.c16m32"
      - "ecs.c1.c24m48"
      - "ecs.c1.c32m64"
      - "ecs.g1.c16m120"
      - "ecs.g1.c32m240"

  system_disk_type:
    type: string
    description: "系统盘类型"
    default: "local.ssd"
    enum:
      - "local.ssd"
      - "cloud.ssd"

  system_disk_size:
    type: number
    description: "系统盘大小（GiB）"
    default: 50
    minimum: 10
    maximum: 500

  internet_charge_type:
    type: string
    description: "网络计费类型"
    default: "PeakBandwidth"
    enum:
      - "Bandwidth"
      - "PeakBandwidth"
      - "Traffic"

  internet_max_bandwidth:
    type: number
    description: "公网最大带宽（Mbps），取值范围 10-200"
    default: 100
    minimum: 10
    maximum: 200

  root_password:
    type: string
    description: "实例 root 用户密码（要求：不少于 8 位，必须同时包含字母、数字和特殊符号）"
    minLength: 8
    allOf:
      - pattern: "[A-Za-z]"
      - pattern: "[0-9]"
      - pattern: "[^A-Za-z0-9]"

  qiniu_maas_api_key:
    type: string
    description: "七牛 MaaS API 密钥（从 https://portal.qiniu.com/ai-inference/api-key 获取）"
    minLength: 1

  default_model:
    type: string
    description: "使用的 AI 模型（如 minimax/minimax-m2.5、deepseek/deepseek-chat、qwen/qwen-max 等）"
    default: "minimax/minimax-m2.5"

  wx_secret:
    type: string
    description: "可选的微信绑定串，格式为 botid|token|savedAt|baseUrl|userId；为空时跳过微信初始化"
    default: ""

  qq_secret:
    type: string
    description: "可选的 QQ 机器人凭证，格式为 AppID:AppSecret；为空时跳过 QQ channel 初始化"
    default: ""

  gateway_port:
    type: number
    description: "Gateway 端口"
    default: 18789
    minimum: 1
    maximum: 65535

  expose_dashboard:
    type: boolean
    description: "是否将 Dashboard 暴露到公网"
    default: false

  disable_device_auth:
    type: boolean
    description: "是否禁用设备认证"
    default: false

  cost_period:
    type: number
    description: "预付费购买时长(月)"
    default: 1
    minimum: 1
    maximum: 36

required:
  - root_password
  - qiniu_maas_api_key

x-input-groups:
  - name: "七牛 LAS 配置"
    inputs:
      - instance_type
      - system_disk_type
      - system_disk_size
      - internet_charge_type
      - internet_max_bandwidth
      - root_password
  - name: "七牛 MaaS 配置"
    inputs:
      - qiniu_maas_api_key
      - default_model
  - name: "通信平台配置"
    inputs:
      - wx_secret
      - qq_secret
    collapsible: true # 可以被折叠
    defaultCollapsed: true # 默认折叠起来

  - name: "OpenClaw Gateway 配置"
    inputs:
      - gateway_port
      - expose_dashboard
      - disable_device_auth
    collapsible: true # 可以被折叠
    defaultCollapsed: true # 默认折叠起来

  - name: "付费配置"
    inputs:
      - cost_period